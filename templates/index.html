<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game Insights</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Game Insights">
  <style>
    :root{
      --panel:rgba(7,17,31,.88);
      --panel-2:rgba(12,28,48,.94);
      --line:rgba(148,163,184,.18);
      --text:#edf2f7;
      --muted:#93a4ba;
      --green:#22c55e;
      --yellow:#facc15;
      --red:#ef4444;
      --blue:#60a5fa;
      --ice:#bfe6ff;
      --grass:#86efac;
      --shadow:0 18px 50px rgba(0,0,0,.30);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(96,165,250,.14), transparent 30%),
        radial-gradient(circle at top right, rgba(34,197,94,.10), transparent 25%),
        linear-gradient(180deg,#03101d 0%,#081625 100%);
      background-attachment:fixed;
      position:relative;
      overflow-x:hidden;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
    }

    body.theme-nhl{
      background:
        radial-gradient(circle at 50% -10%, rgba(191,230,255,.22), transparent 38%),
        radial-gradient(circle at 15% 10%, rgba(125,211,252,.14), transparent 28%),
        radial-gradient(circle at 85% 8%, rgba(96,165,250,.12), transparent 24%),
        linear-gradient(180deg,#02101b 0%, #072036 45%, #091a2b 100%);
      background-attachment:fixed;
    }

    body.theme-nhl::before{
      background:
        linear-gradient(90deg, transparent 8%, rgba(255,255,255,.05) 8.3%, transparent 8.6%, transparent 49.6%, rgba(239,68,68,.18) 50%, transparent 50.4%, transparent 91.4%, rgba(255,255,255,.05) 91.7%, transparent 92%),
        linear-gradient(180deg, transparent 14%, rgba(255,255,255,.04) 14.2%, transparent 14.4%, transparent 85.6%, rgba(255,255,255,.04) 85.8%, transparent 86%);
      opacity:.75;
    }

    body.theme-nhl::after{
      background:
        radial-gradient(circle at 50% 46%, rgba(255,255,255,.08), transparent 12%),
        radial-gradient(circle at 50% 46%, rgba(191,230,255,.07), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,.04), transparent 18%);
      mix-blend-mode:screen;
      opacity:.7;
    }

    body.theme-mlb{
      background:
        radial-gradient(circle at 50% -10%, rgba(134,239,172,.16), transparent 38%),
        radial-gradient(circle at 12% 8%, rgba(34,197,94,.10), transparent 28%),
        radial-gradient(circle at 88% 10%, rgba(96,165,250,.08), transparent 26%),
        linear-gradient(180deg,#08140b 0%, #0d2915 42%, #122014 100%);
      background-attachment:fixed;
    }

    body.theme-mlb::before{
      background:
        radial-gradient(circle at 50% 100%, rgba(120,113,108,.16), transparent 34%),
        linear-gradient(180deg, transparent 62%, rgba(120,113,108,.11) 72%, rgba(120,113,108,.14) 100%);
      opacity:.8;
    }

    body.theme-mlb::after{
      background:
        radial-gradient(circle at 50% 78%, rgba(255,255,255,.10), transparent 1.4%),
        conic-gradient(from 225deg at 50% 78%, transparent 0deg 43deg, rgba(255,255,255,.12) 43deg 47deg, transparent 47deg 313deg, rgba(255,255,255,.12) 313deg 317deg, transparent 317deg 360deg),
        radial-gradient(circle at 50% 78%, rgba(34,197,94,.08), transparent 22%);
      opacity:.5;
    }

    .wrap{
      max-width:1320px;
      margin:0 auto;
      padding:16px;
      position:relative;
      z-index:1;
    }

    .hero,.panel,.game-card,.drop,.tab-btn,.reason-btn,.choice-btn,select{
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .hero{
      border-radius:22px;
      padding:18px;
      background:linear-gradient(180deg, rgba(8,20,34,.92), rgba(6,16,29,.92));
      margin-bottom:14px;
      position:sticky;
      top:0;
      z-index:5;
    }

    .hero.top-accent-nhl{
      box-shadow:0 18px 50px rgba(96,165,250,.20);
      border-color:rgba(191,230,255,.18);
    }

    .hero.top-accent-mlb{
      box-shadow:0 18px 50px rgba(34,197,94,.18);
      border-color:rgba(134,239,172,.16);
    }

    h1{
      margin:0;
      text-align:center;
      font-size:30px;
      letter-spacing:.4px;
    }

    h2,h3{margin:0}

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-top:16px;
    }

    .tab-btn{
      appearance:none;
      background:var(--panel-2);
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      cursor:pointer;
      font-weight:800;
      width:100%;
      text-align:center;
      transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    .tab-btn:hover{transform:translateY(-1px)}

    .tab-btn.active{
      border-color:rgba(96,165,250,.55);
      box-shadow:0 0 0 1px rgba(96,165,250,.55) inset;
      background:linear-gradient(180deg, rgba(30,64,175,.45), rgba(15,23,42,.95));
    }

    body.theme-mlb .tab-btn.active{
      border-color:rgba(34,197,94,.46);
      box-shadow:0 0 0 1px rgba(34,197,94,.42) inset;
      background:linear-gradient(180deg, rgba(22,101,52,.42), rgba(15,23,42,.95));
    }

    .panel{
      background:var(--panel);
      border-radius:20px;
      padding:16px;
      margin-bottom:14px;
      position:relative;
      overflow:hidden;
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.02), transparent 24%);
      pointer-events:none;
    }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
      position:relative;
      z-index:1;
    }

    .muted{color:var(--muted)}

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
      position:relative;
      z-index:1;
    }

    .game-card{
      background:linear-gradient(180deg, rgba(15,30,50,.95), rgba(8,19,35,.98));
      border-radius:20px;
      padding:14px;
      cursor:pointer;
      transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    body.theme-nhl .game-card,
    body.theme-nhl .drop{
      background:
        linear-gradient(180deg, rgba(13,31,52,.96), rgba(7,20,34,.98));
    }

    body.theme-mlb .game-card,
    body.theme-mlb .drop{
      background:
        linear-gradient(180deg, rgba(18,50,28,.95), rgba(10,30,16,.98));
    }

    .game-card:hover{transform:translateY(-2px)}

    .game-card.active{
      border-color:rgba(96,165,250,.6);
      box-shadow:0 0 0 1px rgba(96,165,250,.55) inset, 0 16px 40px rgba(0,0,0,.22);
    }

    body.theme-mlb .game-card.active{
      border-color:rgba(34,197,94,.52);
      box-shadow:0 0 0 1px rgba(34,197,94,.42) inset, 0 16px 40px rgba(0,0,0,.22);
    }

    .teams-line{
      font-size:22px;
      font-weight:800;
      margin-bottom:8px;
    }

    .score-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .score{
      font-size:30px;
      font-weight:900;
      letter-spacing:.5px;
      white-space:nowrap;
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .chip{
      border:1px solid var(--line);
      background:rgba(2,10,18,.62);
      border-radius:999px;
      padding:7px 10px;
      font-size:12px;
      color:var(--muted);
    }

    body.theme-nhl .chip{
      background:rgba(8,22,37,.72);
    }

    body.theme-mlb .chip{
      background:rgba(8,24,15,.72);
    }

    .drop{
      margin-top:12px;
      border-radius:18px;
      padding:16px;
      border:1px solid var(--line);
    }

    .pick-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:10px 14px;
      font-weight:900;
      font-size:16px;
    }

    .pick-green{background:rgba(34,197,94,.18);color:#bbf7d0;border:1px solid rgba(34,197,94,.38)}
    .pick-yellow{background:rgba(250,204,21,.18);color:#fde68a;border:1px solid rgba(250,204,21,.35)}
    .pick-red{background:rgba(239,68,68,.18);color:#fecaca;border:1px solid rgba(239,68,68,.35)}

    .mini-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin-top:12px;
    }

    .mini{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      background:rgba(2,10,18,.38);
    }

    .mini .label{color:var(--muted);font-size:12px}
    .mini .value{font-size:20px;font-weight:800;margin-top:6px}
    .good{color:#bbf7d0}
    .yellow{color:#fde68a}
    .red{color:#fecaca}

    .reason-list{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .reason-item{
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(2,10,18,.34);
      overflow:hidden;
    }

    .reason-btn{
      width:100%;
      text-align:left;
      background:transparent;
      color:var(--text);
      border:0;
      padding:13px 14px;
      cursor:pointer;
      font-weight:800;
    }

    .reason-body{
      display:none;
      padding:0 14px 14px;
      color:var(--muted);
      line-height:1.45;
    }

    .reason-item.open .reason-body{display:block}

    .choice-list{display:grid;gap:12px}

    .choice-row{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:rgba(2,10,18,.28);
    }

    .choice-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .choice-picks{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:10px;
    }

    .choice-btn{
      appearance:none;
      background:var(--panel-2);
      color:var(--text);
      padding:12px;
      border-radius:14px;
      cursor:pointer;
      font-weight:800;
      width:100%;
      text-align:center;
      transition:transform .15s ease, border-color .15s ease;
    }

    .choice-btn:hover{transform:translateY(-1px)}

    .choice-btn.active{
      border-color:rgba(96,165,250,.55);
      box-shadow:0 0 0 1px rgba(96,165,250,.55) inset;
    }

    body.theme-mlb .choice-btn.active{
      border-color:rgba(34,197,94,.55);
      box-shadow:0 0 0 1px rgba(34,197,94,.45) inset;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:8px 12px;
      font-weight:800;
      font-size:13px;
      border:1px solid var(--line);
    }

    .status-green{background:rgba(34,197,94,.18);color:#bbf7d0}
    .status-red{background:rgba(239,68,68,.18);color:#fecaca}
    .status-yellow{background:rgba(250,204,21,.18);color:#fde68a}
    .status-gray{background:rgba(148,163,184,.12);color:#cbd5e1}

    .analyze-toolbar{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:14px;
      position:relative;
      z-index:1;
    }

    select{
      background:var(--panel-2);
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      min-width:220px;
      outline:none;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:18px;
      position:relative;
      z-index:1;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:900px;
    }

    th,td{
      padding:10px 12px;
      border-bottom:1px solid rgba(148,163,184,.12);
      text-align:left;
      white-space:nowrap;
    }

    th{background:rgba(2,10,18,.35)}
    .tag-green{color:#bbf7d0;font-weight:800}
    .tag-red{color:#fecaca;font-weight:800}
    .tag-yellow{color:#fde68a;font-weight:800}

    .bar{
      width:160px;
      height:12px;
      border-radius:999px;
      background:rgba(148,163,184,.14);
      overflow:hidden;
      position:relative;
    }

    .bar-fill{
      height:100%;
      background:linear-gradient(90deg, rgba(34,197,94,.9), rgba(96,165,250,.9));
    }

    body.theme-mlb .bar-fill{
      background:linear-gradient(90deg, rgba(34,197,94,.9), rgba(250,204,21,.75));
    }

    .spark{
      display:flex;
      gap:4px;
      align-items:flex-end;
      height:22px;
    }

    .spark span{
      display:block;
      width:10px;
      border-radius:3px 3px 0 0;
      background:#64748b;
    }

    .spark .win{background:#22c55e}
    .spark .otw{background:#facc15}
    .spark .otl{background:#f59e0b}
    .spark .loss{background:#ef4444}

    .error{
      display:none;
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(239,68,68,.38);
      background:rgba(127,29,29,.25);
      color:#fecaca;
    }

    .empty{
      padding:40px 14px;
      text-align:center;
      color:var(--muted);
      border:1px dashed var(--line);
      border-radius:18px;
      position:relative;
      z-index:1;
    }

    .hidden{display:none}

    @media (max-width: 980px){
      .tabs{grid-template-columns:repeat(2,1fr)}
      .grid,.mini-grid{grid-template-columns:1fr}
      .choice-picks{grid-template-columns:1fr}
      h1{font-size:26px}
    }
  </style>
</head>
<body class="theme-nhl">
  <div class="wrap">
    <div class="hero top-accent-nhl" id="hero">
      <h1 id="titleText">🏒 Game Insights</h1>

      <div class="tabs">
        <button class="tab-btn active" data-tab="board">NHL</button>
        <button class="tab-btn" data-tab="mlb">MLB</button>
        <button class="tab-btn" data-tab="choices">Choices</button>
        <button class="tab-btn" data-tab="analyze">Team Analyze</button>
      </div>

      <div class="error" id="topError"></div>
    </div>

    <div class="panel" id="boardPanel">
      <div class="section-head">
        <strong id="boardTitle">Today’s Games</strong>
        <span class="muted" id="boardHint">Loading...</span>
      </div>
      <div id="boardArea" class="grid">
        <div class="empty">Loading games...</div>
      </div>
    </div>

    <div class="panel hidden" id="choicesPanel">
      <div class="section-head">
        <strong>Choices</strong>
        <span class="muted">Pick today’s winners and track results</span>
      </div>
      <div id="choicesArea">
        <div class="empty">Loading choices...</div>
      </div>
    </div>

    <div class="panel hidden" id="analyzePanel">
      <div class="section-head">
        <strong>Team Analyze</strong>
        <span class="muted">Spreadsheet and graph by opponent</span>
      </div>

      <div class="analyze-toolbar">
        <label for="teamSelect" class="muted">Team</label>
        <select id="teamSelect"></select>
      </div>

      <div id="analyzeArea">
        <div class="empty">Choose a team to load matchup history.</div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const state = {
        sport: 'nhl',
        tab: 'board',
        boards: { nhl: null, mlb: null },
        insights: { nhl: null, mlb: null },
        teams: { nhl: null, mlb: null },
        analyze: { nhl: null, mlb: null },
        selectedGameIdBySport: { nhl: null, mlb: null },
        selectedAnalyzeTeamBySport: { nhl: null, mlb: null }
      };

      function byId(id){ return document.getElementById(id); }

      function esc(v){
        return String(v == null ? '' : v)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      }

      function fmtDateTime(v){
        if(!v) return '-';
        const d = new Date(v);
        return d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
      }

      function showError(msg){
        const box = byId('topError');
        if(!msg){
          box.style.display='none';
          box.textContent='';
          return;
        }
        box.style.display='block';
        box.textContent=msg;
      }

      async function getJSON(url){
        const res = await fetch(url,{cache:'no-store'});
        let data = null;
        try { data = await res.json(); } catch(e) {}
        if(!res.ok){
          throw new Error((data && data.error) ? data.error : ('HTTP ' + res.status));
        }
        return data;
      }

      function storageKey(){
        return 'game_choices_' + state.sport;
      }

      function getSavedChoices(){
        try{
          return JSON.parse(localStorage.getItem(storageKey()) || '{}');
        }catch(e){
          return {};
        }
      }

      function saveChoice(gameId, teamCode){
        const data = getSavedChoices();
        data[String(gameId)] = teamCode;
        localStorage.setItem(storageKey(), JSON.stringify(data));
      }

      function setTheme(){
        const sport = state.sport;
        document.body.className = sport === 'mlb' ? 'theme-mlb' : 'theme-nhl';
        byId('hero').className = 'hero ' + (sport === 'mlb' ? 'top-accent-mlb' : 'top-accent-nhl');
        byId('titleText').textContent = sport === 'mlb' ? '⚾ Game Insights' : '🏒 Game Insights';
        byId('boardTitle').textContent = sport === 'mlb' ? 'Today’s MLB Games' : 'Today’s NHL Games';
      }

      function refreshTabButtons(){
        document.querySelectorAll('.tab-btn').forEach(function(btn){
          const tab = btn.getAttribute('data-tab');
          const active =
            (state.tab === 'board' && tab === 'board' && state.sport === 'nhl') ||
            (state.tab === 'board' && tab === 'mlb' && state.sport === 'mlb') ||
            state.tab === tab;
          btn.classList.toggle('active', active);
        });
      }

      function switchTab(tab){
        if(tab === 'board'){
          byId('boardPanel').classList.remove('hidden');
          byId('choicesPanel').classList.add('hidden');
          byId('analyzePanel').classList.add('hidden');
        } else if(tab === 'choices'){
          byId('boardPanel').classList.add('hidden');
          byId('choicesPanel').classList.remove('hidden');
          byId('analyzePanel').classList.add('hidden');
        } else if(tab === 'analyze'){
          byId('boardPanel').classList.add('hidden');
          byId('choicesPanel').classList.add('hidden');
          byId('analyzePanel').classList.remove('hidden');
        }
      }

      function boardGames(){
        const board = state.boards[state.sport];
        return (((board || {}).days || [])[0] || {}).games || [];
      }

      function findInsight(gameId){
        const payload = state.insights[state.sport];
        if(!payload || !payload.insights) return null;
        return payload.insights.find(function(x){ return String(x.gameId) === String(gameId); }) || null;
      }

      function derivePredictedScore(insight){
        const total = Number((insight && insight.projectedTotal) || (state.sport === 'nhl' ? 6 : 9));
        const homeProb = Number((insight && insight.homeWinProbability) || 50);
        let margin = (homeProb - 50) / (state.sport === 'nhl' ? 11 : 8);
        const maxMargin = state.sport === 'nhl' ? 2.2 : 3.5;
        if (margin > maxMargin) margin = maxMargin;
        if (margin < -maxMargin) margin = -maxMargin;

        let homeRaw = (total / 2) + margin / 2;
        let awayRaw = total - homeRaw;

        let homeScore = Math.max(0, Math.round(homeRaw));
        let awayScore = Math.max(0, Math.round(awayRaw));

        if (homeScore === awayScore) {
          if ((insight && insight.predictedWinner) === insight.homeCode) homeScore += 1;
          else awayScore += 1;
        }
        return { away: awayScore, home: homeScore };
      }

      function pickBadgeHtml(insight){
        if(!insight){
          return '<span class="pick-badge pick-red">Unavailable</span>';
        }
        if(insight.tier === 'tight'){
          return '<span class="pick-badge pick-yellow">Tight game • ' + esc(insight.predictedWinner) + ' slight edge</span>';
        }
        return '<span class="pick-badge pick-green">Pick • ' + esc(insight.predictedWinner) + '</span>';
      }

      function reasonItem(reason){
        return '' +
          '<div class="reason-item">' +
            '<button type="button" class="reason-btn">' + esc(reason.label) + '</button>' +
            '<div class="reason-body">' + esc(reason.text) + '</div>' +
          '</div>';
      }

      function detailDropHtml(insight){
        if(!insight){
          return '<div class="drop"><div class="empty">Could not build this insight right now.</div></div>';
        }

        const pred = derivePredictedScore(insight);
        const loserClass = insight.tier === 'tight' ? 'yellow' : 'red';

        return '' +
          '<div class="drop">' +
            '<div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;">' +
              '<div>' +
                '<h3>' + esc(insight.awayCode) + ' @ ' + esc(insight.homeCode) + '</h3>' +
                '<div class="muted" style="margin-top:6px;">' + esc(insight.awayName) + ' vs ' + esc(insight.homeName) + ' • ' + esc(insight.venue || '') + '</div>' +
              '</div>' +
              pickBadgeHtml(insight) +
            '</div>' +

            '<div class="mini-grid">' +
              '<div class="mini"><div class="label">Predicted score</div><div class="value">' + esc(pred.away) + ' - ' + esc(pred.home) + '</div></div>' +
              '<div class="mini"><div class="label">Predicted winner</div><div class="value good">' + esc(insight.predictedWinner) + '</div></div>' +
              '<div class="mini"><div class="label">Predicted loser</div><div class="value ' + loserClass + '">' + esc(insight.predictedLoser) + '</div></div>' +
              '<div class="mini"><div class="label">Confidence</div><div class="value">' + esc(insight.confidence) + '%</div></div>' +
              '<div class="mini"><div class="label">Projected total ' + (state.sport === 'nhl' ? 'goals' : 'runs') + '</div><div class="value">' + esc(insight.projectedTotal) + '</div></div>' +
              '<div class="mini"><div class="label">Updated</div><div class="value" style="font-size:16px;">' + esc(fmtDateTime(insight.lastPredictionRefreshUTC)) + '</div></div>' +
            '</div>' +

            '<div class="chip-row">' +
              (state.sport === 'nhl'
                ? (
                    '<div class="chip">Likely point team: ' + esc(insight.likelyPointTeam) + '</div>' +
                    '<div class="chip">' + esc((((insight.playerPicks || {}).away || {}).teamCode) || insight.awayCode) + ' assist pick: ' + esc((((insight.playerPicks || {}).away || {}).player) || 'No data') + '</div>' +
                    '<div class="chip">' + esc((((insight.playerPicks || {}).home || {}).teamCode) || insight.homeCode) + ' assist pick: ' + esc((((insight.playerPicks || {}).home || {}).player) || 'No data') + '</div>'
                  )
                : '<div class="chip">Probable pitchers: ' + esc((((insight.probablePitchers || {}).away) || 'TBD') + ' vs ' + (((insight.probablePitchers || {}).home) || 'TBD')) + '</div>') +
            '</div>' +

            (state.sport === 'nhl'
              ? (
                  '<div class="mini-grid">' +
                    '<div class="mini">' +
                      '<div class="label">' + esc(insight.awayCode) + ' hot assist pick</div>' +
                      '<div class="value" style="font-size:18px;">' + esc(((((insight.playerPicks || {}).away) || {}).player) || 'No data') + '</div>' +
                      '<div class="muted" style="margin-top:6px;">' +
                        esc(((((insight.playerPicks || {}).away) || {}).assistsLast3) ?? 0) + ' assists in last ' +
                        esc(((((insight.playerPicks || {}).away) || {}).gamesUsed) ?? 0) + ' games' +
                      '</div>' +
                    '</div>' +
                    '<div class="mini">' +
                      '<div class="label">' + esc(insight.homeCode) + ' hot assist pick</div>' +
                      '<div class="value" style="font-size:18px;">' + esc(((((insight.playerPicks || {}).home) || {}).player) || 'No data') + '</div>' +
                      '<div class="muted" style="margin-top:6px;">' +
                        esc(((((insight.playerPicks || {}).home) || {}).assistsLast3) ?? 0) + ' assists in last ' +
                        esc(((((insight.playerPicks || {}).home) || {}).gamesUsed) ?? 0) + ' games' +
                      '</div>' +
                    '</div>' +
                  '</div>'
                )
              : '') +

            '<div class="reason-list">' + (insight.reasons || []).map(reasonItem).join('') + '</div>' +
          '</div>';
      }

      function renderBoard(){
        const games = boardGames();
        const host = byId('boardArea');

        if(!games.length){
          host.innerHTML = '<div class="empty">No games loaded for today.</div>';
          byId('boardHint').textContent = 'No games';
          return;
        }

        byId('boardHint').textContent = games.length + ' games today';

        const openGameId = state.selectedGameIdBySport[state.sport];
        host.innerHTML = games.map(function(g){
          const insight = findInsight(g.id);
          const pred = insight ? derivePredictedScore(insight) : null;
          const active = String(g.id) === String(openGameId) ? ' active' : '';

          return '' +
            '<div class="game-card' + active + '" data-game-id="' + esc(g.id) + '">' +
              '<div class="teams-line">' + esc(g.awayCode) + ' @ ' + esc(g.homeCode) + '</div>' +
              '<div class="score-row">' +
                '<div>' +
                  '<div><strong>' + esc(g.awayName) + '</strong></div>' +
                  '<div><strong>' + esc(g.homeName) + '</strong></div>' +
                '</div>' +
                '<div class="score">' + (pred ? (esc(pred.away) + ' - ' + esc(pred.home)) : '-') + '</div>' +
              '</div>' +
              '<div class="chip-row">' +
                '<div class="chip">Predicted score</div>' +
                '<div class="chip">' + esc(fmtDateTime(g.startTimeUTC)) + '</div>' +
                '<div class="chip">' + esc(g.venue || '') + '</div>' +
                (state.sport === 'nhl'
                  ? (
                      '<div class="chip">' + esc(g.awayCode) + ': ' + esc(((((insight || {}).playerPicks || {}).away || {}).player) || 'No data') + '</div>' +
                      '<div class="chip">' + esc(g.homeCode) + ': ' + esc(((((insight || {}).playerPicks || {}).home || {}).player) || 'No data') + '</div>'
                    )
                  : '') +
              '</div>' +
              (String(g.id) === String(openGameId) ? detailDropHtml(insight) : '') +
            '</div>';
        }).join('');

        host.querySelectorAll('[data-game-id]').forEach(function(el){
          el.addEventListener('click', function(){
            const gameId = this.getAttribute('data-game-id');
            state.selectedGameIdBySport[state.sport] =
              String(state.selectedGameIdBySport[state.sport]) === String(gameId) ? null : gameId;
            renderBoard();
          });
        });

        host.querySelectorAll('.reason-item').forEach(function(item){
          const btn = item.querySelector('.reason-btn');
          if(btn){
            btn.addEventListener('click', function(ev){
              ev.stopPropagation();
              item.classList.toggle('open');
            });
          }
        });
      }

      function choiceStatus(game, pickedCode){
        const statusText = String(game.status || '');
        const finalish = state.sport === 'nhl'
          ? game.status === 'OFF'
          : statusText.toLowerCase().indexOf('final') !== -1;

        const previewish = state.sport === 'nhl'
          ? (game.status === 'PRE' || game.status === 'FUT')
          : (statusText.toLowerCase().indexOf('preview') !== -1 || statusText.toLowerCase().indexOf('scheduled') !== -1);

        const awayLeading = Number(game.awayScore) > Number(game.homeScore);
        const homeLeading = Number(game.homeScore) > Number(game.awayScore);
        const winningCode = awayLeading ? game.awayCode : homeLeading ? game.homeCode : null;

        if(!pickedCode){
          return { cls:'status-gray', text:'No choice saved' };
        }
        if(previewish){
          return { cls:'status-gray', text:'Game not started' };
        }
        if(finalish){
          if(winningCode === pickedCode){
            return { cls:'status-green', text:'Won' };
          }
          if(winningCode && winningCode !== pickedCode){
            return { cls:'status-red', text:'Lost' };
          }
          return { cls:'status-yellow', text:'Final / tied state' };
        }
        if(winningCode === pickedCode){
          return { cls:'status-green', text:'Live • currently winning' };
        }
        if(winningCode && winningCode !== pickedCode){
          return { cls:'status-red', text:'Live • currently losing' };
        }
        return { cls:'status-yellow', text:'Live • tied' };
      }

      function renderChoices(){
        const games = boardGames();
        const picks = getSavedChoices();
        const host = byId('choicesArea');

        if(!games.length){
          host.innerHTML = '<div class="empty">No games available right now.</div>';
          return;
        }

        host.innerHTML =
          '<div class="choice-list">' +
          games.map(function(g){
            const picked = picks[String(g.id)] || '';
            const status = choiceStatus(g, picked);
            return '' +
              '<div class="choice-row">' +
                '<div class="choice-head">' +
                  '<div>' +
                    '<div><strong>' + esc(g.awayCode) + ' @ ' + esc(g.homeCode) + '</strong></div>' +
                    '<div class="muted" style="margin-top:4px;">' + esc(fmtDateTime(g.startTimeUTC)) + ' • ' + esc(g.venue || '') + '</div>' +
                  '</div>' +
                  '<span class="status-pill ' + esc(status.cls) + '">' + esc(status.text) + '</span>' +
                '</div>' +
                '<div class="choice-picks">' +
                  '<button type="button" class="choice-btn' + (picked === g.awayCode ? ' active' : '') + '" data-game="' + esc(g.id) + '" data-team="' + esc(g.awayCode) + '">' + esc(g.awayName) + ' (' + esc(g.awayCode) + ')</button>' +
                  '<button type="button" class="choice-btn' + (picked === g.homeCode ? ' active' : '') + '" data-game="' + esc(g.id) + '" data-team="' + esc(g.homeCode) + '">' + esc(g.homeName) + ' (' + esc(g.homeCode) + ')</button>' +
                '</div>' +
              '</div>';
          }).join('') +
          '</div>';

        host.querySelectorAll('.choice-btn').forEach(function(btn){
          btn.addEventListener('click', function(){
            const gameId = this.getAttribute('data-game');
            const teamCode = this.getAttribute('data-team');
            saveChoice(gameId, teamCode);
            renderChoices();
          });
        });
      }

      function sparkHtml(trend){
        const vals = Array.isArray(trend) ? trend : [];
        if(!vals.length){
          return '<div class="spark"><span style="height:10px;"></span></div>';
        }
        return '<div class="spark">' + vals.map(function(v){
          const cls = v === 1 ? 'win' : v === 0.5 ? 'otw' : v === -0.5 ? 'otl' : 'loss';
          const h = v === 1 ? 22 : v === 0.5 ? 18 : v === -0.5 ? 14 : 10;
          return '<span class="' + cls + '" style="height:' + h + 'px;"></span>';
        }).join('') + '</div>';
      }

      async function loadAnalyze(teamCode){
        const host = byId('analyzeArea');
        host.innerHTML = '<div class="empty">Loading matchup history...</div>';

        try{
          const payload = await getJSON('/api/team-analyze/' + state.sport + '/' + encodeURIComponent(teamCode));
          state.analyze[state.sport] = payload;

          const rows = payload.rows || [];
          if(!rows.length){
            host.innerHTML = '<div class="empty">No matchup history available yet.</div>';
            return;
          }

          host.innerHTML =
            '<div class="table-wrap">' +
              '<table>' +
                '<thead>' +
                  '<tr>' +
                    '<th>Opponent</th>' +
                    '<th>Games</th>' +
                    '<th>Wins</th>' +
                    '<th>Losses</th>' +
                    '<th>OTW</th>' +
                    '<th>OTL</th>' +
                    '<th>GF</th>' +
                    '<th>GA</th>' +
                    '<th>Diff</th>' +
                    '<th>Score %</th>' +
                    '<th>Graph</th>' +
                    '<th>Trend</th>' +
                  '</tr>' +
                '</thead>' +
                '<tbody>' +
                  rows.map(function(r){
                    const diff = Number(r.goalDiff || 0);
                    const pct = Number(r.scorePct || 0);
                    const pctWidth = Math.max(0, Math.min(100, Math.round(pct * 100)));
                    const diffCls = diff > 0 ? 'tag-green' : diff < 0 ? 'tag-red' : 'tag-yellow';
                    return '' +
                      '<tr>' +
                        '<td><strong>' + esc(r.opponentName) + '</strong> <span class="muted">(' + esc(r.opponentCode) + ')</span></td>' +
                        '<td>' + esc(r.games) + '</td>' +
                        '<td class="tag-green">' + esc(r.wins) + '</td>' +
                        '<td class="tag-red">' + esc(r.losses) + '</td>' +
                        '<td class="tag-yellow">' + esc(r.otWins || 0) + '</td>' +
                        '<td class="tag-yellow">' + esc(r.otLosses || 0) + '</td>' +
                        '<td>' + esc(r.gf) + '</td>' +
                        '<td>' + esc(r.ga) + '</td>' +
                        '<td class="' + diffCls + '">' + esc(diff) + '</td>' +
                        '<td>' + esc((pct * 100).toFixed(1)) + '%</td>' +
                        '<td><div class="bar"><div class="bar-fill" style="width:' + pctWidth + '%;"></div></div></td>' +
                        '<td>' + sparkHtml(r.trend) + '</td>' +
                      '</tr>';
                  }).join('') +
                '</tbody>' +
              '</table>' +
            '</div>';
        }catch(err){
          host.innerHTML = '<div class="empty">Could not load team analyze data.</div>';
          showError('Could not load analyze data: ' + err.message);
        }
      }

      async function ensureData(){
        if(!state.boards[state.sport]){
          state.boards[state.sport] = await getJSON('/api/board/' + state.sport);
        }
        if(!state.insights[state.sport]){
          state.insights[state.sport] = await getJSON('/api/insights/' + state.sport);
        }
        if(!state.teams[state.sport]){
          state.teams[state.sport] = await getJSON('/api/teams/' + state.sport);
        }
        if(!state.selectedAnalyzeTeamBySport[state.sport]){
          const list = ((state.teams[state.sport] || {}).teams || []);
          if(list[0]) state.selectedAnalyzeTeamBySport[state.sport] = list[0].code;
        }
      }

      function renderTeamSelect(){
        const teams = ((state.teams[state.sport] || {}).teams || []);
        const sel = byId('teamSelect');
        const selected = state.selectedAnalyzeTeamBySport[state.sport] || '';
        sel.innerHTML = teams.map(function(t){
          return '<option value="' + esc(t.code) + '"' + (t.code === selected ? ' selected' : '') + '>' + esc(t.name) + ' (' + esc(t.code) + ')</option>';
        }).join('');
      }

      async function fullRender(){
        try{
          showError('');
          await ensureData();
          setTheme();
          refreshTabButtons();
          switchTab(state.tab);
          renderBoard();
          renderChoices();
          renderTeamSelect();
          if(state.tab === 'analyze'){
            await loadAnalyze(state.selectedAnalyzeTeamBySport[state.sport]);
          }
        }catch(err){
          showError('Could not load data: ' + err.message);
        }
      }

      document.querySelectorAll('.tab-btn').forEach(function(btn){
        btn.addEventListener('click', async function(){
          const tab = this.getAttribute('data-tab');
          if(tab === 'board'){
            state.tab = 'board';
            state.sport = 'nhl';
          } else if(tab === 'mlb'){
            state.tab = 'board';
            state.sport = 'mlb';
          } else {
            state.tab = tab;
          }
          await fullRender();
        });
      });

      byId('teamSelect').addEventListener('change', async function(){
        state.selectedAnalyzeTeamBySport[state.sport] = this.value;
        await loadAnalyze(this.value);
      });

      fullRender();

      setInterval(async function(){
        try{
          state.boards[state.sport] = await getJSON('/api/board/' + state.sport);
          state.insights[state.sport] = await getJSON('/api/insights/' + state.sport);
          if(state.tab === 'board'){
            renderBoard();
          } else if(state.tab === 'choices'){
            renderChoices();
          }
        }catch(e){}
      }, 900000);
    });
  </script>
</body>
</html>
