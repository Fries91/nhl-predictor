<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game Insights</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Game Insights">
  <style>
    :root{
      --panel:rgba(7,17,31,.88);
      --panel-2:rgba(12,28,48,.94);
      --line:rgba(148,163,184,.18);
      --text:#edf2f7;
      --muted:#93a4ba;
      --green:#22c55e;
      --yellow:#facc15;
      --red:#ef4444;
      --blue:#60a5fa;
      --shadow:0 18px 50px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(96,165,250,.14), transparent 30%),
        radial-gradient(circle at top right, rgba(34,197,94,.10), transparent 25%),
        linear-gradient(180deg,#03101d 0%,#081625 100%);
      min-height:100vh;
    }
    body.theme-nhl{
      background:
        linear-gradient(180deg, rgba(205,237,255,.05), rgba(0,0,0,0) 20%),
        radial-gradient(circle at 50% 0%, rgba(159,215,255,.18), transparent 40%),
        linear-gradient(180deg,#02101c 0%, #082033 100%);
    }
    body.theme-mlb{
      background:
        radial-gradient(circle at 50% 0%, rgba(96,165,250,.10), transparent 35%),
        linear-gradient(180deg,#0b1f10 0%, #102818 100%);
    }
    .wrap{max-width:1320px;margin:0 auto;padding:16px}
    .hero,.panel,.game-card,.drop,.tab-btn,.reason-btn,.choice-btn,select{
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }
    .hero{
      border-radius:22px;
      padding:18px;
      background:linear-gradient(180deg, rgba(8,20,34,.92), rgba(6,16,29,.92));
      margin-bottom:14px;
      position:sticky;
      top:0;
      z-index:5;
    }
    .hero.top-accent-nhl{box-shadow:0 18px 50px rgba(96,165,250,.15)}
    .hero.top-accent-mlb{box-shadow:0 18px 50px rgba(34,197,94,.12)}
    h1{margin:0;text-align:center;font-size:30px}
    h2,h3{margin:0}
    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-top:16px;
    }
    .tab-btn{
      appearance:none;
      background:var(--panel-2);
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      cursor:pointer;
      font-weight:800;
      width:100%;
      text-align:center;
    }
    .tab-btn.active{
      border-color:rgba(96,165,250,.55);
      box-shadow:0 0 0 1px rgba(96,165,250,.55) inset;
      background:linear-gradient(180deg, rgba(30,64,175,.45), rgba(15,23,42,.95));
    }
    .panel{
      background:var(--panel);
      border-radius:20px;
      padding:16px;
      margin-bottom:14px;
    }
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }
    .muted{color:var(--muted)}
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }
    .game-card{
      background:linear-gradient(180deg, rgba(15,30,50,.95), rgba(8,19,35,.98));
      border-radius:20px;
      padding:14px;
      cursor:pointer;
      transition:transform .15s ease, border-color .15s ease;
    }
    body.theme-mlb .game-card,
    body.theme-mlb .drop{
      background:linear-gradient(180deg, rgba(18,50,28,.95), rgba(10,30,16,.98));
    }
    .game-card:hover{transform:translateY(-2px)}
    .game-card.active{
      border-color:rgba(96,165,250,.6);
      box-shadow:0 0 0 1px rgba(96,165,250,.55) inset;
    }
    .teams-line{font-size:22px;font-weight:800;margin-bottom:8px}
    .score-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .score{font-size:30px;font-weight:900;letter-spacing:.5px;white-space:nowrap}
    .chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .chip{
      border:1px solid var(--line);
      background:rgba(2,10,18,.62);
      border-radius:999px;
      padding:7px 10px;
      font-size:12px;
      color:var(--muted);
    }
    .drop{
      margin-top:12px;
      background:linear-gradient(180deg, rgba(11,25,43,.95), rgba(8,18,31,.97));
      border-radius:18px;
      padding:16px;
      border:1px solid var(--line);
    }
    .pick-badge{
      display:inline-flex;align-items:center;gap:8px;
      border-radius:999px;padding:10px 14px;font-weight:900;font-size:16px
    }
    .pick-green{background:rgba(34,197,94,.18);color:#bbf7d0;border:1px solid rgba(34,197,94,.38)}
    .pick-yellow{background:rgba(250,204,21,.18);color:#fde68a;border:1px solid rgba(250,204,21,.35)}
    .pick-red{background:rgba(239,68,68,.18);color:#fecaca;border:1px solid rgba(239,68,68,.35)}
    .mini-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin-top:12px;
    }
    .mini{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      background:rgba(2,10,18,.38);
    }
    .mini .label{color:var(--muted);font-size:12px}
    .mini .value{font-size:20px;font-weight:800;margin-top:6px}
    .good{color:#bbf7d0}
    .yellow{color:#fde68a}
    .red{color:#fecaca}
    .reason-list{display:grid;gap:10px;margin-top:12px}
    .reason-item{
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(2,10,18,.34);
      overflow:hidden;
    }
    .reason-btn{
      width:100%;
      text-align:left;
      background:transparent;
      color:var(--text);
      border:0;
      padding:13px 14px;
      cursor:pointer;
      font-weight:800;
    }
    .reason-body{display:none;padding:0 14px 14px;color:var(--muted);line-height:1.45}
    .reason-item.open .reason-body{display:block}

    .choice-list{display:grid;gap:12px}
    .choice-row{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:rgba(2,10,18,.28);
    }
    .choice-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .choice-picks{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:10px;
    }
    .choice-btn{
      appearance:none;
      background:var(--panel-2);
      color:var(--text);
      padding:12px;
      border-radius:14px;
      cursor:pointer;
      font-weight:800;
      width:100%;
      text-align:center;
    }
    .choice-btn.active{
      border-color:rgba(96,165,250,.55);
      box-shadow:0 0 0 1px rgba(96,165,250,.55) inset;
    }
    .status-pill{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:8px 12px;
      font-weight:800;
      font-size:13px;
      border:1px solid var(--line);
    }
    .status-green{background:rgba(34,197,94,.18);color:#bbf7d0}
    .status-red{background:rgba(239,68,68,.18);color:#fecaca}
    .status-yellow{background:rgba(250,204,21,.18);color:#fde68a}
    .status-gray{background:rgba(148,163,184,.12);color:#cbd5e1}

    .analyze-toolbar{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    select{
      background:var(--panel-2);
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      min-width:220px;
    }
    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:18px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      min-width:900px;
    }
    th,td{
      padding:10px 12px;
      border-bottom:1px solid rgba(148,163,184,.12);
      text-align:left;
      white-space:nowrap;
    }
    th{background:rgba(2,10,18,.35)}
    .tag-green{color:#bbf7d0;font-weight:800}
    .tag-red{color:#fecaca;font-weight:800}
    .tag-yellow{color:#fde68a;font-weight:800}
    .bar{
      width:160px;
      height:12px;
      border-radius:999px;
      background:rgba(148,163,184,.14);
      overflow:hidden;
      position:relative;
    }
    .bar-fill{
      height:100%;
      background:linear-gradient(90deg, rgba(34,197,94,.9), rgba(96,165,250,.9));
    }
    .spark{
      display:flex;
      gap:4px;
      align-items:flex-end;
      height:22px;
    }
    .spark span{
      display:block;
      width:10px;
      border-radius:3px 3px 0 0;
      background:#64748b;
    }
    .spark .win{background:#22c55e}
    .spark .otw{background:#facc15}
    .spark .otl{background:#f59e0b}
    .spark .loss{background:#ef4444}
    .error{
      display:none;
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(239,68,68,.38);
      background:rgba(127,29,29,.25);
      color:#fecaca;
    }
    .empty{
      padding:40px 14px;
      text-align:center;
      color:var(--muted);
      border:1px dashed var(--line);
      border-radius:18px;
    }
    .hidden{display:none}
    @media (max-width: 980px){
      .tabs{grid-template-columns:repeat(2,1fr)}
      .grid,.mini-grid{grid-template-columns:1fr}
      .choice-picks{grid-template-columns:1fr}
      h1{font-size:26px}
    }
  </style>
</head>
<body class="theme-nhl">
  <div class="wrap">
    <div class="hero top-accent-nhl" id="hero">
      <h1 id="titleText">🏒 Game Insights</h1>

      <div class="tabs">
        <button class="tab-btn active" data-tab="board">NHL</button>
        <button class="tab-btn" data-tab="mlb">MLB</button>
        <button class="tab-btn" data-tab="choices">Choices</button>
        <button class="tab-btn" data-tab="analyze">Team Analyze</button>
      </div>

      <div class="error" id="topError"></div>
    </div>

    <div class="panel" id="boardPanel">
      <div class="section-head">
        <strong id="boardTitle">Today’s Games</strong>
        <span class="muted" id="boardHint">Loading...</span>
      </div>
      <div id="boardArea" class="grid">
        <div class="empty">Loading games...</div>
      </div>
    </div>

    <div class="panel hidden" id="choicesPanel">
      <div class="section-head">
        <strong>Choices</strong>
        <span class="muted">Pick today’s winners and track results</span>
      </div>
      <div id="choicesArea">
        <div class="empty">Loading choices...</div>
      </div>
    </div>

    <div class="panel hidden" id="analyzePanel">
      <div class="section-head">
        <strong>Team Analyze</strong>
        <span class="muted">Spreadsheet and graph by opponent</span>
      </div>

      <div class="analyze-toolbar">
        <label for="teamSelect" class="muted">Team</label>
        <select id="teamSelect"></select>
      </div>

      <div id="analyzeArea">
        <div class="empty">Choose a team to load matchup history.</div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const state = {
        sport: 'nhl',
        tab: 'board',
        boards: { nhl: null, mlb: null },
        insights: { nhl: null, mlb: null },
        teams: { nhl: null, mlb: null },
        analyze: { nhl: null, mlb: null },
        selectedGameIdBySport: { nhl: null, mlb: null },
        selectedAnalyzeTeamBySport: { nhl: null, mlb: null }
      };

      function byId(id){ return document.getElementById(id); }
      function esc(v){
        return String(v == null ? '' : v)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      }
      function fmtDateTime(v){
        if(!v) return '-';
        const d = new Date(v);
        return d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
      }
      function showError(msg){
        const box = byId('topError');
        if(!msg){ box.style.display='none'; box.textContent=''; return; }
        box.style.display='block';
        box.textContent=msg;
      }
      async function getJSON(url){
        const res = await fetch(url,{cache:'no-store'});
        let data = null;
        try { data = await res.json(); } catch(e) {}
        if(!res.ok){
          throw new Error((data && data.error) ? data.error : ('HTTP ' + res.status));
        }
        return data;
      }
      function storageKey(){
        return 'game_choices_' + state.sport;
      }
      function getSavedChoices(){
        try{
          return JSON.parse(localStorage.getItem(storageKey()) || '{}');
        }catch(e){
          return {};
        }
      }
      function saveChoice(gameId, teamCode){
        const data = getSavedChoices();
        data[String(gameId)] = teamCode;
        localStorage.setItem(storageKey(), JSON.stringify(data));
      }
      function setTheme(){
        const sport = state.sport;
        document.body.className = sport === 'mlb' ? 'theme-mlb' : 'theme-nhl';
        byId('hero').className = 'hero ' + (sport === 'mlb' ? 'top-accent-mlb' : 'top-accent-nhl');
        byId('titleText').textContent = sport === 'mlb' ? '⚾ Game Insights' : '🏒 Game Insights';
        byId('boardTitle').textContent = sport === 'mlb' ? 'Today’s MLB Games' : 'Today’s NHL Games';
      }
      function refreshTabButtons(){
        document.querySelectorAll('.tab-btn').forEach(function(btn){
          const tab = btn.getAttribute('data-tab');
          const active =
            (state.tab === 'board' && tab === 'board' && state.sport === 'nhl') ||
            (state.tab === 'board' && tab === 'mlb' && state.sport === 'mlb') ||
            state.tab === tab;
          btn.classList.toggle('active', active);
        });
      }
      function switchTab(tab){
        if(tab === 'board'){
          byId('boardPanel').classList.remove('hidden');
          byId('choicesPanel').classList.add('hidden');
          byId('analyzePanel').classList.add('hidden');
        } else if(tab === 'choices'){
          byId('boardPanel').classList.add('hidden');
          byId('choicesPanel').classList.remove('hidden');
          byId('analyzePanel').classList.add('hidden');
        } else if(tab === 'analyze'){
          byId('boardPanel').classList.add('hidden');
          byId('choicesPanel').classList.add('hidden');
          byId('analyzePanel').classList.remove('hidden');
        }
      }
      function boardGames(){
        const board = state.boards[state.sport];
        return (((board || {}).days || [])[0] || {}).games || [];
      }
      function findInsight(gameId){
        const payload = state.insights[state.sport];
        if(!payload || !payload.insights) return null;
        return payload.insights.find(function(x){ return String(x.gameId) === String(gameId); }) || null;
      }
      function derivePredictedScore(insight){
        const total = Number((insight && insight.projectedTotal) || (state.sport === 'nhl' ? 6 : 9));
        const homeProb = Number((insight && insight.homeWinProbability) || 50);
        let margin = (homeProb - 50) / (state.sport === 'nhl' ? 11 : 8);
        const maxMargin = state.sport === 'nhl' ? 2.2 : 3.5;
        if (margin > maxMargin) margin = maxMargin;
        if (margin < -maxMargin) margin = -maxMargin;

        let homeRaw = (total / 2) + margin / 2;
        let awayRaw = total - homeRaw;

        let homeScore = Math.max(0, Math.round(homeRaw));
        let awayScore = Math.max(0, Math.round(awayRaw));

        if (homeScore === awayScore) {
          if ((insight && insight.predictedWinner) === insight.homeCode) homeScore += 1;
          else awayScore += 1;
        }
        return { away: awayScore, home: homeScore };
      }
      function pickBadgeHtml(insight){
        if(!insight){
          return '<span class="pick-badge pick-red">Unavailable</span>';
        }
        if(insight.tier === 'tight'){
          return '<span class="pick-badge pick-yellow">Tight game • ' + esc(insight.predictedWinner) + ' slight edge</span>';
        }
        return '<span class="pick-badge pick-green">Pick • ' + esc(insight.predictedWinner) + '</span>';
      }
      function reasonItem(reason){
        return '' +
          '<div class="reason-item">' +
            '<button type="button" class="reason-btn">' + esc(reason.label) + '</button>' +
            '<div class="reason-body">' + esc(reason.text) + '</div>' +
          '</div>';
      }
      function detailDropHtml(insight){
        if(!insight){
          return '<div class="drop"><div class="empty">Could not build this insight right now.</div></div>';
        }
        const pred = derivePredictedScore(insight);
        const loserClass = insight.tier === 'tight' ? 'yellow' : 'red';

        return '' +
          '<div class="drop">' +
            '<div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;">' +
              '<div>' +
                '<h3>' + esc(insight.awayCode) + ' @ ' + esc(insight.homeCode) + '</h3>' +
                '<div class="muted" style="margin-top:6px;">' + esc(insight.awayName) + ' vs ' + esc(insight.homeName) + ' • ' + esc(insight.venue || '') + '</div>' +
              '</div>' +
              pickBadgeHtml(insight) +
            '</div>' +

            '<div class="mini-grid">' +
              '<div class="mini"><div class="label">Predicted score</div><div class="value">' + esc(pred.away) + ' - ' + esc(pred.home) + '</div></div>' +
              '<div class="mini"><div class="label">Predicted winner</div><div class="value good">' + esc(insight.predictedWinner) + '</div></div>' +
              '<div class="mini"><div class="label">Predicted loser</div><div class="value ' + loserClass + '">' + esc(insight.predictedLoser) + '</div></div>' +
              '<div class="mini"><div class="label">Confidence</div><div class="value">' + esc(insight.confidence) + '%</div></div>' +
              '<div class="mini"><div class="label">Projected total ' + (state.sport === 'nhl' ? 'goals' : 'runs') + '</div><div class="value">' + esc(insight.projectedTotal) + '</div></div>' +
              '<div class="mini"><div class="label">Updated</div><div class="value" style="font-size:16px;">' + esc(fmtDateTime(insight.lastPredictionRefreshUTC)) + '</div></div>' +
            '</div>' +

            '<div class="chip-row">' +
              (state.sport === 'nhl'
                ? '<div class="chip">Likely point team: ' + esc(insight.likelyPointTeam) + '</div>'
                : '<div class="chip">Probable pitchers: ' + esc(((insight.probablePitchers || {}).away || 'TBD') + ' vs ' + (((insight.probablePitchers || {}).home || 'TBD'))) + '</div>') +
            '</div>' +

            '<div class="reason-list">' + (insight.reasons || []).map(reasonItem).join('') + '</div>' +
          '</div>';
      }
      function renderBoard(){
        const games = boardGames();
        const host = byId('boardArea');

        if(!games.length){
          host.innerHTML = '<div class="empty">No games loaded for today.</div>';
          byId('boardHint').textContent = 'No games';
          return;
        }

        byId('boardHint').textContent = games.length + ' games today';

        const openGameId = state.selectedGameIdBySport[state.sport];
        host.innerHTML = games.map(function(g){
          const insight = findInsight(g.id);
          const pred = insight ? derivePredictedScore(insight) : null;
          const active = String(g.id) === String(openGameId) ? ' active' : '';
          return '' +
            '<div class="game-card' + active + '" data-game-id="' + esc(g.id) + '">' +
              '<div class="teams-line">' + esc(g.awayCode) + ' @ ' + esc(g.homeCode) + '</div>' +
              '<div class="score-row">' +
                '<div>' +
                  '<div><strong>' + esc(g.awayName) + '</strong></div>' +
                  '<div><strong>' + esc(g.homeName) + '</strong></div>' +
                '</div>' +
                '<div class="score">' + (pred ? (esc(pred.away) + ' - ' + esc(pred.home)) : '-') + '</div>' +
              '</div>' +
              '<div class="chip-row">' +
                '<div class="chip">Predicted score</div>' +
                '<div class="chip">' + esc(fmtDateTime(g.startTimeUTC)) + '</div>' +
                '<div class="chip">' + esc(g.venue || '') + '</div>' +
              '</div>' +
              (String(g.id) === String(openGameId) ? detailDropHtml(insight) : '') +
            '</div>';
        }).join('');

        host.querySelectorAll('[data-game-id]').forEach(function(el){
          el.addEventListener('click', function(){
            const gameId = this.getAttribute('data-game-id');
            state.selectedGameIdBySport[state.sport] =
              String(state.selectedGameIdBySport[state.sport]) === String(gameId) ? null : gameId;
            renderBoard();
          });
        });

        host.querySelectorAll('.reason-item').forEach(function(item){
          const btn = item.querySelector('.reason-btn');
          if(btn){
            btn.addEventListener('click', function(ev){
              ev.stopPropagation();
              item.classList.toggle('open');
            });
          }
        });
      }
      function choiceStatus(game, pickedCode){
        const finalish = state.sport === 'nhl'
          ? game.status === 'OFF'
          : (String(game.status).toLowerCase().indexOf('final') !== -1);

        const previewish = state.sport === 'nhl'
          ? (game.status === 'PRE' || game.status === 'FUT')
          : (String(game.status).toLowerCase().indexOf('preview') !== -1 || String(game.status).toLowerCase().indexOf('scheduled') !== -1);

        const awayLeading = Number(game.awayScore) > Number(game.homeScore);
        const homeLeading = Number(game.homeScore) > Number(game.awayScore);
        const winningCode = awayLeading ? game.awayCode : homeLeading ? game.homeCode : null;

        if(!pickedCode){
          return { cls:'status-gray', text:'No choice saved' };
        }
        if(previewish){
          return { cls:'status-gray', text:'Currently not playing' };
        }
        if(finalish){
          if(!winningCode){
            return { cls:'status-yellow', text:'Final • tied result feed' };
          }
          return {
            cls: pickedCode === winningCode ? 'status-green' : 'status-red',
            text: pickedCode === winningCode ? 'Won choice' : 'Lost choice'
          };
        }
        if(!winningCode){
          return { cls:'status-yellow', text:'Live • tied ' + game.awayScore + '-' + game.homeScore };
        }
        return {
          cls: pickedCode === winningCode ? 'status-green' : 'status-red',
          text: 'Live • ' + game.awayScore + '-' + game.homeScore
        };
      }
      function renderChoices(){
        const games = boardGames();
        const saved = getSavedChoices();
        const host = byId('choicesArea');

        if(!games.length){
          host.innerHTML = '<div class="empty">No games available for today.</div>';
          return;
        }

        host.innerHTML = '<div class="choice-list">' + games.map(function(g){
          const savedPick = saved[String(g.id)] || '';
          const status = choiceStatus(g, savedPick);
          return '' +
            '<div class="choice-row">' +
              '<div class="choice-head">' +
                '<div>' +
                  '<div><strong>' + esc(g.awayCode) + ' @ ' + esc(g.homeCode) + '</strong></div>' +
                  '<div class="muted">' + esc(fmtDateTime(g.startTimeUTC)) + ' • ' + esc(g.venue || '') + '</div>' +
                '</div>' +
                '<span class="status-pill ' + esc(status.cls) + '">' + esc(status.text) + '</span>' +
              '</div>' +
              '<div class="muted">Live/final score: ' + esc(g.awayScore) + ' - ' + esc(g.homeScore) + '</div>' +
              '<div class="choice-picks">' +
                '<button class="choice-btn ' + (savedPick === g.awayCode ? 'active' : '') + '" data-pick-game="' + esc(g.id) + '" data-pick-team="' + esc(g.awayCode) + '">' + esc(g.awayName) + '</button>' +
                '<button class="choice-btn ' + (savedPick === g.homeCode ? 'active' : '') + '" data-pick-game="' + esc(g.id) + '" data-pick-team="' + esc(g.homeCode) + '">' + esc(g.homeName) + '</button>' +
              '</div>' +
            '</div>';
        }).join('') + '</div>';

        host.querySelectorAll('[data-pick-game]').forEach(function(btn){
          btn.addEventListener('click', function(){
            saveChoice(this.getAttribute('data-pick-game'), this.getAttribute('data-pick-team'));
            renderChoices();
          });
        });
      }
      function renderAnalyzeTable(payload){
        const rows = payload.rows || [];
        if(!rows.length){
          return '<div class="empty">No completed matchup data found yet.</div>';
        }

        return '' +
          '<div class="table-wrap">' +
            '<table>' +
              '<thead>' +
                '<tr>' +
                  '<th>Opponent</th>' +
                  '<th>GP</th>' +
                  '<th>W</th>' +
                  '<th>L</th>' +
                  '<th>OTW</th>' +
                  '<th>OTL</th>' +
                  '<th>GF</th>' +
                  '<th>GA</th>' +
                  '<th>GD</th>' +
                  '<th>Graph</th>' +
                  '<th>Recent</th>' +
                '</tr>' +
              '</thead>' +
              '<tbody>' +
                rows.map(function(r){
                  const width = Math.max(4, Math.round((Number(r.scorePct) || 0) * 100));
                  const trend = (r.trend || []).map(function(v){
                    let cls = 'loss';
                    let h = 8;
                    if(v === 1){ cls = 'win'; h = 22; }
                    else if(v === 0.5){ cls = 'otw'; h = 18; }
                    else if(v === -0.5){ cls = 'otl'; h = 12; }
                    return '<span class="' + cls + '" style="height:' + h + 'px"></span>';
                  }).join('');
                  return '' +
                    '<tr>' +
                      '<td><strong>' + esc(r.opponentCode) + '</strong> <span class="muted">' + esc(r.opponentName) + '</span></td>' +
                      '<td>' + esc(r.games) + '</td>' +
                      '<td class="tag-green">' + esc(r.wins) + '</td>' +
                      '<td class="tag-red">' + esc(r.losses) + '</td>' +
                      '<td class="tag-yellow">' + esc(r.otWins) + '</td>' +
                      '<td class="tag-yellow">' + esc(r.otLosses) + '</td>' +
                      '<td>' + esc(r.gf) + '</td>' +
                      '<td>' + esc(r.ga) + '</td>' +
                      '<td class="' + ((Number(r.goalDiff) >= 0) ? 'tag-green' : 'tag-red') + '">' + esc(r.goalDiff) + '</td>' +
                      '<td><div class="bar"><div class="bar-fill" style="width:' + width + '%"></div></div></td>' +
                      '<td><div class="spark">' + trend + '</div></td>' +
                    '</tr>';
                }).join('') +
              '</tbody>' +
            '</table>' +
          '</div>';
      }
      async function loadAnalyze(teamCode){
        if(!teamCode) return;
        byId('analyzeArea').innerHTML = '<div class="empty">Loading matchup history...</div>';
        const payload = await getJSON('/api/team-analyze/' + state.sport + '/' + encodeURIComponent(teamCode));
        state.analyze[state.sport] = payload;
        byId('analyzeArea').innerHTML =
          '<div class="muted" style="margin-bottom:12px;"><strong>' + esc(payload.teamName) + '</strong> season matchup sheet</div>' +
          renderAnalyzeTable(payload);
      }
      async function ensureData(){
        if(!state.boards[state.sport]){
          state.boards[state.sport] = await getJSON('/api/board/' + state.sport);
        }
        if(!state.insights[state.sport]){
          state.insights[state.sport] = await getJSON('/api/insights/' + state.sport);
        }
        if(!state.teams[state.sport]){
          state.teams[state.sport] = await getJSON('/api/teams/' + state.sport);
        }
        if(!state.selectedAnalyzeTeamBySport[state.sport]){
          const list = ((state.teams[state.sport] || {}).teams || []);
          if(list[0]) state.selectedAnalyzeTeamBySport[state.sport] = list[0].code;
        }
      }
      function renderTeamSelect(){
        const teams = ((state.teams[state.sport] || {}).teams || []);
        const sel = byId('teamSelect');
        const selected = state.selectedAnalyzeTeamBySport[state.sport] || '';
        sel.innerHTML = teams.map(function(t){
          return '<option value="' + esc(t.code) + '"' + (t.code === selected ? ' selected' : '') + '>' + esc(t.name) + ' (' + esc(t.code) + ')</option>';
        }).join('');
      }
      async function fullRender(){
        try{
          showError('');
          await ensureData();
          setTheme();
          refreshTabButtons();
          switchTab(state.tab);
          renderBoard();
          renderChoices();
          renderTeamSelect();
          if(state.tab === 'analyze'){
            await loadAnalyze(state.selectedAnalyzeTeamBySport[state.sport]);
          }
        }catch(err){
          showError('Could not load data: ' + err.message);
        }
      }

      document.querySelectorAll('.tab-btn').forEach(function(btn){
        btn.addEventListener('click', async function(){
          const tab = this.getAttribute('data-tab');
          if(tab === 'board'){
            state.tab = 'board';
            state.sport = 'nhl';
          } else if(tab === 'mlb'){
            state.tab = 'board';
            state.sport = 'mlb';
          } else {
            state.tab = tab;
          }
          await fullRender();
        });
      });

      byId('teamSelect').addEventListener('change', async function(){
        state.selectedAnalyzeTeamBySport[state.sport] = this.value;
        await loadAnalyze(this.value);
      });

      fullRender();

      setInterval(async function(){
        try{
          state.boards[state.sport] = await getJSON('/api/board/' + state.sport);
          state.insights[state.sport] = await getJSON('/api/insights/' + state.sport);
          if(state.tab === 'board'){
            renderBoard();
          } else if(state.tab === 'choices'){
            renderChoices();
          }
        }catch(e){}
      }, 900000);
    });
  </script>
</body>
</html>
