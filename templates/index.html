<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game Insights</title>
  <style>
    :root{
      --panel:rgba(8,19,33,.82);
      --panel-2:rgba(13,30,50,.9);
      --line:rgba(191,230,255,.18);
      --text:#edf2f7;
      --muted:#a9b9cc;
      --green:#22c55e;
      --yellow:#facc15;
      --red:#ef4444;
      --shadow:0 18px 50px rgba(0,0,0,.24);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at 50% -10%, rgba(191,230,255,.34), transparent 40%),
        radial-gradient(circle at 16% 10%, rgba(125,211,252,.20), transparent 30%),
        radial-gradient(circle at 84% 9%, rgba(96,165,250,.17), transparent 28%),
        linear-gradient(180deg,#072038 0%, #0a2a46 42%, #0b243b 100%);
      background-attachment:fixed;
      overflow-x:hidden;
    }

    body.theme-mlb{
      background:
        radial-gradient(circle at 50% -10%, rgba(134,239,172,.22), transparent 38%),
        radial-gradient(circle at 12% 8%, rgba(34,197,94,.14), transparent 28%),
        radial-gradient(circle at 88% 10%, rgba(96,165,250,.10), transparent 26%),
        linear-gradient(180deg,#0a1a0f 0%, #10311b 42%, #112617 100%);
    }

    .wrap{
      max-width:1320px;
      margin:0 auto;
      padding:16px;
    }

    .hero,.panel,.game-card,.choice-row,.tab-btn,.day-btn,.choice-btn,select{
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .hero{
      border-radius:22px;
      padding:18px;
      background:linear-gradient(180deg, rgba(9,23,39,.84), rgba(8,20,34,.84));
      margin-bottom:14px;
      position:sticky;
      top:0;
      z-index:5;
    }

    h1{
      margin:0;
      text-align:center;
      font-size:30px;
      letter-spacing:.4px;
    }

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-top:16px;
    }

    .tab-btn{
      appearance:none;
      background:rgba(12,28,48,.72);
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      cursor:pointer;
      font-weight:800;
      width:100%;
      text-align:center;
    }

    .tab-btn.active{
      border-color:rgba(96,165,250,.55);
      box-shadow:0 0 0 1px rgba(96,165,250,.55) inset;
      background:linear-gradient(180deg, rgba(30,64,175,.38), rgba(15,23,42,.80));
    }

    body.theme-mlb .tab-btn.active{
      border-color:rgba(34,197,94,.46);
      box-shadow:0 0 0 1px rgba(34,197,94,.42) inset;
      background:linear-gradient(180deg, rgba(22,101,52,.36), rgba(15,23,42,.82));
    }

    .day-tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .day-btn{
      appearance:none;
      background:rgba(12,28,48,.70);
      color:var(--text);
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      font-weight:800;
    }

    .day-btn.active{
      border-color:rgba(250,204,21,.45);
      box-shadow:0 0 0 1px rgba(250,204,21,.32) inset;
      color:#fde68a;
    }

    .panel{
      background:linear-gradient(180deg, rgba(8,19,33,.76), rgba(8,19,33,.70));
      border-radius:20px;
      padding:16px;
      margin-bottom:14px;
    }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .muted{color:var(--muted)}

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }

    .game-card{
      background:linear-gradient(180deg, rgba(15,30,50,.84), rgba(8,19,35,.90));
      border-radius:20px;
      padding:14px;
    }

    body.theme-mlb .game-card{
      background:linear-gradient(180deg, rgba(18,50,28,.84), rgba(10,30,16,.90));
    }

    .teams-line{
      font-size:22px;
      font-weight:800;
      margin-bottom:8px;
    }

    .score-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .score{
      font-size:30px;
      font-weight:900;
      white-space:nowrap;
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .chip{
      border:1px solid var(--line);
      background:rgba(2,10,18,.42);
      border-radius:999px;
      padding:7px 10px;
      font-size:12px;
      color:var(--muted);
    }

    .chip-strong{
      color:#bbf7d0;
      border-color:rgba(34,197,94,.35);
    }

    .chip-tight{
      color:#fde68a;
      border-color:rgba(250,204,21,.35);
    }

    .choice-list{display:grid;gap:12px}

    .choice-row{
      border-radius:18px;
      padding:14px;
      background:rgba(2,10,18,.22);
    }

    .choice-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .choice-picks{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:10px;
    }

    .choice-btn{
      appearance:none;
      background:rgba(12,28,48,.72);
      color:var(--text);
      padding:12px;
      border-radius:14px;
      cursor:pointer;
      font-weight:800;
      width:100%;
      text-align:center;
    }

    .choice-btn.active{
      border-color:rgba(96,165,250,.55);
      box-shadow:0 0 0 1px rgba(96,165,250,.55) inset;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:8px 12px;
      font-weight:800;
      font-size:13px;
      border:1px solid var(--line);
    }

    .status-green{background:rgba(34,197,94,.18);color:#bbf7d0}
    .status-red{background:rgba(239,68,68,.18);color:#fecaca}
    .status-yellow{background:rgba(250,204,21,.18);color:#fde68a}
    .status-gray{background:rgba(148,163,184,.12);color:#cbd5e1}

    .analyze-toolbar{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    select{
      background:rgba(12,28,48,.72);
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      min-width:220px;
      outline:none;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:18px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1120px;
    }

    th,td{
      padding:10px 12px;
      border-bottom:1px solid rgba(148,163,184,.12);
      text-align:left;
      white-space:nowrap;
      vertical-align:top;
    }

    th{background:rgba(2,10,18,.28)}

    .bar{
      width:160px;
      height:12px;
      border-radius:999px;
      background:rgba(148,163,184,.14);
      overflow:hidden;
    }

    .bar-fill{
      height:100%;
      background:linear-gradient(90deg, rgba(34,197,94,.9), rgba(96,165,250,.9));
    }

    body.theme-mlb .bar-fill{
      background:linear-gradient(90deg, rgba(34,197,94,.9), rgba(250,204,21,.75));
    }

    .spark{
      display:flex;
      gap:4px;
      align-items:flex-end;
      height:22px;
    }

    .spark span{
      display:block;
      width:10px;
      border-radius:3px 3px 0 0;
      background:#64748b;
    }

    .spark .win{background:#22c55e}
    .spark .otw{background:#facc15}
    .spark .otl{background:#f59e0b}
    .spark .loss{background:#ef4444}

    .period-cell{
      min-width:170px;
    }

    .period-row{
      margin-bottom:8px;
    }

    .period-top{
      display:flex;
      justify-content:space-between;
      gap:8px;
      font-size:11px;
      margin-bottom:4px;
    }

    .period-bars{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
    }

    .period-track{
      height:10px;
      border-radius:999px;
      background:rgba(148,163,184,.14);
      overflow:hidden;
    }

    .period-fill-for{
      height:100%;
      background:rgba(34,197,94,.78);
    }

    .period-fill-against{
      height:100%;
      background:rgba(239,68,68,.78);
    }

    .error{
      display:none;
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(239,68,68,.38);
      background:rgba(127,29,29,.22);
      color:#fecaca;
    }

    .empty{
      padding:40px 14px;
      text-align:center;
      color:var(--muted);
      border:1px dashed var(--line);
      border-radius:18px;
    }

    .hidden{display:none}

    @media (max-width: 980px){
      .tabs{grid-template-columns:repeat(2,1fr)}
      .grid{grid-template-columns:1fr}
      .choice-picks{grid-template-columns:1fr}
      h1{font-size:26px}
    }
  </style>
</head>
<body class="theme-nhl">
  <div class="wrap">
    <div class="hero">
      <h1 id="titleText">🏒 Game Insights</h1>

      <div class="tabs">
        <button class="tab-btn active" data-tab="board">NHL</button>
        <button class="tab-btn" data-tab="mlb">MLB</button>
        <button class="tab-btn" data-tab="choices">Choices</button>
        <button class="tab-btn" data-tab="analyze">Team Analyze</button>
      </div>

      <div class="day-tabs" id="dayTabs"></div>
      <div class="error" id="topError"></div>
    </div>

    <div class="panel" id="boardPanel">
      <div class="section-head">
        <strong id="boardTitle">Games</strong>
        <span class="muted" id="boardHint">Loading...</span>
      </div>
      <div id="boardArea" class="grid">
        <div class="empty">Loading games...</div>
      </div>
    </div>

    <div class="panel hidden" id="choicesPanel">
      <div class="section-head">
        <strong>Choices</strong>
        <span class="muted">Pick winners and track results</span>
      </div>
      <div id="choicesArea">
        <div class="empty">Loading choices...</div>
      </div>
    </div>

    <div class="panel hidden" id="analyzePanel">
      <div class="section-head">
        <strong>Team Analyze</strong>
        <span class="muted">Spreadsheet and graph by opponent</span>
      </div>

      <div class="analyze-toolbar">
        <label for="teamSelect" class="muted">Team</label>
        <select id="teamSelect"></select>
      </div>

      <div id="analyzeArea">
        <div class="empty">Choose a team to load matchup history.</div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const state = {
        sport: 'nhl',
        tab: 'board',
        boards: { nhl: null, mlb: null },
        insights: { nhl: null, mlb: null },
        teams: { nhl: null, mlb: null },
        selectedAnalyzeTeamBySport: { nhl: null, mlb: null },
        selectedDayIndexBySport: { nhl: 0, mlb: 0 }
      };

      function byId(id){ return document.getElementById(id); }

      function esc(v){
        return String(v == null ? '' : v)
          .replace(/&/g,'&amp;')
          .replace(/</g,'&lt;')
          .replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;')
          .replace(/'/g,'&#39;');
      }

      function fmtDateTime(v){
        if(!v) return '-';
        const d = new Date(v);
        return d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
      }

      function showError(msg){
        const box = byId('topError');
        if(!msg){
          box.style.display = 'none';
          box.textContent = '';
          return;
        }
        box.style.display = 'block';
        box.textContent = msg;
      }

      async function getJSON(url){
        const res = await fetch(url, { cache:'no-store' });
        let data = null;
        try { data = await res.json(); } catch (e) {}
        if(!res.ok){
          throw new Error((data && data.error) ? data.error : ('HTTP ' + res.status));
        }
        return data;
      }

      function storageKey(){
        return 'game_choices_' + state.sport;
      }

      function getSavedChoices(){
        try{
          return JSON.parse(localStorage.getItem(storageKey()) || '{}');
        }catch(e){
          return {};
        }
      }

      function saveChoice(gameId, teamCode){
        const data = getSavedChoices();
        const key = String(gameId);

        if(data[key] === teamCode){
          delete data[key];
        } else {
          data[key] = teamCode;
        }

        localStorage.setItem(storageKey(), JSON.stringify(data));
      }

      function setTheme(){
        document.body.className = state.sport === 'mlb' ? 'theme-mlb' : 'theme-nhl';
        byId('titleText').textContent = state.sport === 'mlb' ? '⚾ Game Insights' : '🏒 Game Insights';
        byId('boardTitle').textContent = state.sport === 'mlb' ? 'MLB Games' : 'NHL Games';
      }

      function refreshTabButtons(){
        document.querySelectorAll('.tab-btn').forEach(function(btn){
          const tab = btn.getAttribute('data-tab');
          const active =
            (state.tab === 'board' && tab === 'board' && state.sport === 'nhl') ||
            (state.tab === 'board' && tab === 'mlb' && state.sport === 'mlb') ||
            state.tab === tab;
          btn.classList.toggle('active', active);
        });
      }

      function switchTab(){
        byId('boardPanel').classList.toggle('hidden', state.tab !== 'board');
        byId('choicesPanel').classList.toggle('hidden', state.tab !== 'choices');
        byId('analyzePanel').classList.toggle('hidden', state.tab !== 'analyze');
      }

      function boardDays(){
        const payload = state.boards[state.sport];
        return Array.isArray(payload && payload.days) ? payload.days : [];
      }

      function selectedDayIndex(){
        const days = boardDays();
        let idx = Number(state.selectedDayIndexBySport[state.sport] || 0);
        if(idx < 0 || idx >= days.length) idx = 0;
        state.selectedDayIndexBySport[state.sport] = idx;
        return idx;
      }

      function currentBoardDay(){
        const days = boardDays();
        if(!days.length) return null;
        return days[selectedDayIndex()] || days[0];
      }

      function currentGames(){
        const day = currentBoardDay();
        return Array.isArray(day && day.games) ? day.games.slice() : [];
      }

      function findInsight(gameId){
        const payload = state.insights[state.sport];
        if(!payload || !Array.isArray(payload.insights)) return null;
        return payload.insights.find(function(x){
          return String(x.gameId) === String(gameId);
        }) || null;
      }

      function confidenceTier(insight){
        const conf = Number((insight || {}).confidence || 0);
        if(conf >= 24) return 'Strong edge';
        if(conf >= 14) return 'Medium edge';
        return 'Tight game';
      }

      function chipClass(insight){
        return Number((insight || {}).confidence || 0) >= 24 ? 'chip chip-strong' : 'chip chip-tight';
      }

      function projectedScore(insight){
        if(!insight){
          return { away: 0, home: 0 };
        }

        if(insight.predictedScore){
          return {
            away: Number((insight.predictedScore || {}).away || 0),
            home: Number((insight.predictedScore || {}).home || 0)
          };
        }

        const total = Number(insight.projectedTotal || (state.sport === 'nhl' ? 6 : 9));
        const homeProb = Number(insight.homeWinProbability || 50);
        let margin = (homeProb - 50) / (state.sport === 'nhl' ? 11 : 8);
        const maxMargin = state.sport === 'nhl' ? 2.2 : 3.5;

        if (margin > maxMargin) margin = maxMargin;
        if (margin < -maxMargin) margin = -maxMargin;

        let homeRaw = (total / 2) + margin / 2;
        let awayRaw = total - homeRaw;

        let homeScore = Math.max(0, Math.round(homeRaw));
        let awayScore = Math.max(0, Math.round(awayRaw));

        if (homeScore === awayScore) {
          if (insight.predictedWinner === insight.homeCode) homeScore += 1;
          else awayScore += 1;
        }

        return { away: awayScore, home: homeScore };
      }

      function renderDayTabs(){
        const host = byId('dayTabs');
        if(state.tab !== 'board'){
          host.innerHTML = '';
          return;
        }
        const days = boardDays();
        if(!days.length){
          host.innerHTML = '';
          return;
        }

        host.innerHTML = days.map(function(day, idx){
          const label = day.label || (idx === 0 ? 'Today' : 'Tomorrow');
          const active = idx === selectedDayIndex() ? ' active' : '';
          return '<button type="button" class="day-btn' + active + '" data-day-index="' + idx + '">' + esc(label) + '</button>';
        }).join('');

        host.querySelectorAll('[data-day-index]').forEach(function(btn){
          btn.addEventListener('click', function(){
            state.selectedDayIndexBySport[state.sport] = Number(this.getAttribute('data-day-index'));
            renderDayTabs();
            renderBoard();
            renderChoices();
          });
        });
      }

      function periodGraphHtml(row){
        const pf = Array.isArray(row.periodAvgFor) ? row.periodAvgFor : [0,0,0];
        const pa = Array.isArray(row.periodAvgAgainst) ? row.periodAvgAgainst : [0,0,0];
        const maxVal = Math.max(1, pf[0], pf[1], pf[2], pa[0], pa[1], pa[2]);

        function lane(label, ours, theirs){
          const oursW = Math.max(6, Math.round((Number(ours || 0) / maxVal) * 100));
          const theirsW = Math.max(6, Math.round((Number(theirs || 0) / maxVal) * 100));

          return '' +
            '<div class="period-row">' +
              '<div class="period-top">' +
                '<span>' + esc(label) + '</span>' +
                '<span>' + esc(Number(ours || 0).toFixed(2)) + ' / ' + esc(Number(theirs || 0).toFixed(2)) + '</span>' +
              '</div>' +
              '<div class="period-bars">' +
                '<div class="period-track"><div class="period-fill-for" style="width:' + oursW + '%;"></div></div>' +
                '<div class="period-track"><div class="period-fill-against" style="width:' + theirsW + '%;"></div></div>' +
              '</div>' +
            '</div>';
        }

        return '' +
          '<div class="period-cell">' +
            lane('P1', pf[0], pa[0]) +
            lane('P2', pf[1], pa[1]) +
            lane('P3', pf[2], pa[2]) +
          '</div>';
      }

      function renderBoard(){
        const host = byId('boardArea');
        const games = currentGames();
        const day = currentBoardDay();

        if(!games.length){
          host.innerHTML = '<div class="empty">No games loaded for this day.</div>';
          byId('boardHint').textContent = 'No games';
          return;
        }

        byId('boardHint').textContent = (day && day.label ? day.label + ' • ' : '') + games.length + ' games';

        host.innerHTML = games.map(function(g){
          const insight = findInsight(g.id);
          const pred = insight ? projectedScore(insight) : { away: 0, home: 0 };
          const awayProb = Number(((insight || {}).awayWinProbability || 0)).toFixed(1);
          const homeProb = Number(((insight || {}).homeWinProbability || 0)).toFixed(1);

          return '' +
            '<div class="game-card">' +
              '<div class="teams-line">' + esc(g.awayCode) + ' @ ' + esc(g.homeCode) + '</div>' +
              '<div class="score-row">' +
                '<div>' +
                  '<div><strong>' + esc(g.awayName) + '</strong></div>' +
                  '<div><strong>' + esc(g.homeName) + '</strong></div>' +
                '</div>' +
                '<div class="score">' + esc(pred.away) + ' - ' + esc(pred.home) + '</div>' +
              '</div>' +
              '<div class="chip-row">' +
                '<div class="' + chipClass(insight) + '">' + esc(confidenceTier(insight)) + '</div>' +
                '<div class="chip">' + esc(fmtDateTime(g.startTimeUTC)) + '</div>' +
                '<div class="chip">' + esc(g.venue || '') + '</div>' +
                (
                  state.sport === 'nhl'
                    ? '<div class="chip chip-strong">' + esc(g.awayCode) + ' win ' + esc(awayProb) + '%</div>' +
                      '<div class="chip chip-strong">' + esc(g.homeCode) + ' win ' + esc(homeProb) + '%</div>'
                    : '<div class="chip">Pitchers: ' + esc(((((insight || {}).probablePitchers || {}).away) || 'TBD') + ' vs ' + ((((insight || {}).probablePitchers || {}).home) || 'TBD')) + '</div>'
                ) +
              '</div>' +
            '</div>';
        }).join('');
      }

      function choiceStatus(game, pickedCode){
        const statusText = String(game.status || '');
        const finalish = state.sport === 'nhl'
          ? game.status === 'OFF'
          : statusText.toLowerCase().indexOf('final') !== -1;

        const previewish = state.sport === 'nhl'
          ? (game.status === 'PRE' || game.status === 'FUT')
          : (statusText.toLowerCase().indexOf('preview') !== -1 || statusText.toLowerCase().indexOf('scheduled') !== -1);

        const awayLeading = Number(game.awayScore) > Number(game.homeScore);
        const homeLeading = Number(game.homeScore) > Number(game.awayScore);
        const winningCode = awayLeading ? game.awayCode : homeLeading ? game.homeCode : null;

        if(!pickedCode) return { cls:'status-gray', text:'No choice saved' };
        if(previewish) return { cls:'status-gray', text:'Game not started' };
        if(finalish){
          if(winningCode === pickedCode) return { cls:'status-green', text:'Won' };
          if(winningCode && winningCode !== pickedCode) return { cls:'status-red', text:'Lost' };
          return { cls:'status-yellow', text:'Final / tied state' };
        }
        if(winningCode === pickedCode) return { cls:'status-green', text:'Live • currently winning' };
        if(winningCode && winningCode !== pickedCode) return { cls:'status-red', text:'Live • currently losing' };
        return { cls:'status-yellow', text:'Live • tied' };
      }

      function renderChoices(){
        const games = currentGames();
        const saved = getSavedChoices();
        const host = byId('choicesArea');

        if(!games.length){
          host.innerHTML = '<div class="empty">No games available for this day.</div>';
          return;
        }

        host.innerHTML = '<div class="choice-list">' + games.map(function(g){
          const savedPick = saved[String(g.id)] || '';
          const status = choiceStatus(g, savedPick);
          return '' +
            '<div class="choice-row">' +
              '<div class="choice-head">' +
                '<div>' +
                  '<div><strong>' + esc(g.awayCode) + ' @ ' + esc(g.homeCode) + '</strong></div>' +
                  '<div class="muted">' + esc(fmtDateTime(g.startTimeUTC)) + ' • ' + esc(g.venue || '') + '</div>' +
                '</div>' +
                '<span class="status-pill ' + esc(status.cls) + '">' + esc(status.text) + '</span>' +
              '</div>' +
              '<div class="muted">Live/final score: ' + esc(g.awayScore) + ' - ' + esc(g.homeScore) + '</div>' +
              '<div class="choice-picks">' +
                '<button type="button" class="choice-btn ' + (savedPick === g.awayCode ? 'active' : '') + '" data-pick-game="' + esc(g.id) + '" data-pick-team="' + esc(g.awayCode) + '">' + esc(g.awayName) + ' (' + esc(g.awayCode) + ')</button>' +
                '<button type="button" class="choice-btn ' + (savedPick === g.homeCode ? 'active' : '') + '" data-pick-game="' + esc(g.id) + '" data-pick-team="' + esc(g.homeCode) + '">' + esc(g.homeName) + ' (' + esc(g.homeCode) + ')</button>' +
              '</div>' +
            '</div>';
        }).join('') + '</div>';

        host.querySelectorAll('[data-pick-game]').forEach(function(btn){
          btn.addEventListener('click', function(){
            saveChoice(this.getAttribute('data-pick-game'), this.getAttribute('data-pick-team'));
            renderChoices();
          });
        });
      }

      function sparkHtml(trend){
        const vals = Array.isArray(trend) ? trend : [];
        if(!vals.length) return '<div class="spark"><span style="height:10px;"></span></div>';
        return '<div class="spark">' + vals.map(function(v){
          let cls = 'loss';
          let h = 10;
          if(v === 1){ cls = 'win'; h = 22; }
          else if(v === 0.5){ cls = 'otw'; h = 18; }
          else if(v === -0.5){ cls = 'otl'; h = 14; }
          return '<span class="' + cls + '" style="height:' + h + 'px;"></span>';
        }).join('') + '</div>';
      }

      function renderAnalyzeTable(payload){
        const rows = payload.rows || [];
        if(!rows.length){
          return '<div class="empty">No completed matchup data found yet.</div>';
        }

        return '' +
          '<div class="table-wrap">' +
            '<table>' +
              '<thead>' +
                '<tr><th>Opponent</th><th>GP</th><th>W</th><th>L</th><th>OTW</th><th>OTL</th><th>GF</th><th>GA</th><th>GD</th><th>Score %</th><th>P1 / P2 / P3</th><th>Recent</th></tr>' +
              '</thead>' +
              '<tbody>' +
                rows.map(function(r){
                  return '' +
                    '<tr>' +
                      '<td><strong>' + esc(r.opponentName) + '</strong> <span class="muted">(' + esc(r.opponentCode) + ')</span></td>' +
                      '<td>' + esc(r.games) + '</td>' +
                      '<td>' + esc(r.wins) + '</td>' +
                      '<td>' + esc(r.losses) + '</td>' +
                      '<td>' + esc(r.otWins || 0) + '</td>' +
                      '<td>' + esc(r.otLosses || 0) + '</td>' +
                      '<td>' + esc(r.gf) + '</td>' +
                      '<td>' + esc(r.ga) + '</td>' +
                      '<td>' + esc(r.goalDiff) + '</td>' +
                      '<td>' + esc(((Number(r.scorePct) || 0) * 100).toFixed(1)) + '%</td>' +
                      '<td>' + (state.sport === 'nhl' ? periodGraphHtml(r) : '<div class="bar"><div class="bar-fill" style="width:' + Math.max(4, Math.round((Number(r.scorePct) || 0) * 100)) + '%;"></div></div>') + '</td>' +
                      '<td>' + sparkHtml(r.trend) + '</td>' +
                    '</tr>';
                }).join('') +
              '</tbody>' +
            '</table>' +
          '</div>';
      }

      async function loadAnalyze(teamCode){
        const host = byId('analyzeArea');
        host.innerHTML = '<div class="empty">Loading matchup history...</div>';
        try{
          const payload = await getJSON('/api/team-analyze/' + state.sport + '/' + encodeURIComponent(teamCode));
          host.innerHTML = renderAnalyzeTable(payload);
        }catch(err){
          host.innerHTML = '<div class="empty">Could not load team analyze data.</div>';
          showError('Could not load analyze data: ' + err.message);
        }
      }

      async function ensureBoardAndTeams(){
        const requests = [
          getJSON('/api/board/' + state.sport).then(function(data){ state.boards[state.sport] = data; }),
          getJSON('/api/teams/' + state.sport).then(function(data){ state.teams[state.sport] = data; })
        ];
        await Promise.all(requests);

        if(!state.selectedAnalyzeTeamBySport[state.sport]){
          const list = ((state.teams[state.sport] || {}).teams || []);
          if(list[0]) state.selectedAnalyzeTeamBySport[state.sport] = list[0].code;
        }
      }

      async function loadInsights(){
        try{
          state.insights[state.sport] = await getJSON('/api/insights/' + state.sport);
        }catch(err){
          state.insights[state.sport] = { insights: [] };
          showError('Predictions load failed: ' + err.message);
        }
      }

      function renderTeamSelect(){
        const teams = ((state.teams[state.sport] || {}).teams || []);
        const sel = byId('teamSelect');
        const selected = state.selectedAnalyzeTeamBySport[state.sport] || '';
        sel.innerHTML = teams.map(function(t){
          return '<option value="' + esc(t.code) + '"' + (t.code === selected ? ' selected' : '') + '>' +
            esc(t.name) + ' (' + esc(t.code) + ')' +
          '</option>';
        }).join('');
      }

      async function fullRender(){
        try{
          showError('');
          setTheme();
          refreshTabButtons();
          switchTab();

          byId('boardArea').innerHTML = '<div class="empty">Loading games...</div>';
          byId('choicesArea').innerHTML = '<div class="empty">Loading choices...</div>';

          await ensureBoardAndTeams();
          renderTeamSelect();
          renderDayTabs();
          renderBoard();
          renderChoices();

          loadInsights().then(function(){
            renderBoard();
            renderChoices();
          });

          if(state.tab === 'analyze'){
            await loadAnalyze(state.selectedAnalyzeTeamBySport[state.sport]);
          }
        }catch(err){
          showError('Could not load data: ' + err.message);
          byId('boardArea').innerHTML = '<div class="empty">Could not load games.</div>';
          byId('choicesArea').innerHTML = '<div class="empty">Could not load choices.</div>';
        }
      }

      document.querySelectorAll('.tab-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
          const tab = this.getAttribute('data-tab');
          if(tab === 'board'){
            state.tab = 'board';
            state.sport = 'nhl';
          } else if(tab === 'mlb'){
            state.tab = 'board';
            state.sport = 'mlb';
          } else {
            state.tab = tab;
          }
          fullRender();
        });
      });

      byId('teamSelect').addEventListener('change', function(){
        state.selectedAnalyzeTeamBySport[state.sport] = this.value;
        loadAnalyze(this.value);
      });

      fullRender();
    });
  </script>
</body>
</html>
